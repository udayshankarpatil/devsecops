---
# Host machine setup for task-manager development.
# Installs CLI tools (via Homebrew), Ansible Galaxy collections, and the
# Gitleaks pre-commit hook. Run once per machine and once per fresh clone.
#
# Tools installed: kind, kubectl, helm, yq, pre-commit, hadolint, gitleaks, trivy
#
# Prerequisites:
#   - macOS with Homebrew (https://brew.sh)
#   - Ansible installed: brew install ansible
#
# Usage:
#   bash ops/setup.sh                          # recommended — handles Ansible check
#   ansible-playbook ops/ansible/dev-setup.yml # direct (Ansible must already be installed)

# ── Play 1: Galaxy collections ────────────────────────────────────────────────
# Uses only ansible.builtin so it has no collection dependencies itself.
# Must complete before Play 2 so community.general.homebrew is available.
- name: Install Ansible Galaxy collections
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Check Docker is installed and running
      ansible.builtin.command: docker info
      changed_when: false
      register: docker_check
      failed_when: false

    - name: Fail with helpful message if Docker is not running
      ansible.builtin.fail:
        msg: |
          Docker does not appear to be running (or is not installed).
          Install Docker Desktop and start it, then re-run this playbook.
          https://www.docker.com/products/docker-desktop/
      when: docker_check.rc != 0

    - name: Install Ansible Galaxy collections
      ansible.builtin.command:
        cmd: ansible-galaxy collection install -r {{ playbook_dir }}/requirements.yml
      # Galaxy skips already-satisfied versions; treat as non-changing for
      # idempotency reporting — actual installs are visible in the command output.
      changed_when: false

# ── Play 2: CLI tools ─────────────────────────────────────────────────────────
# community.general is now installed so community.general.homebrew is available.
- name: Install CLI tools via Homebrew
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Install required CLI tools
      community.general.homebrew:
        name:
          - kind
          - kubectl
          - helm
          - yq
          - pre-commit
          - hadolint
          - gitleaks
          - trivy
        state: present

    - name: Check if pre-commit hook is already installed
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../.git/hooks/pre-commit"
      register: precommit_hook

    - name: Install pre-commit hooks
      ansible.builtin.command:
        cmd: pre-commit install
        chdir: "{{ playbook_dir }}/../.."
      when: not precommit_hook.stat.exists
      changed_when: true

    - name: Dev setup complete
      ansible.builtin.debug:
        msg:
          - "All developer tools are installed and pre-commit hooks are active."
          - "Gitleaks will now scan every commit for secrets automatically."
          - "To use GitOps validation (Mode 2), run: bash ops/bootstrap.sh"
