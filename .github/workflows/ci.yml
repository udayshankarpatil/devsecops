name: CI

# Tests run on every PR targeting temp-ci.
# Build (image push to GHCR) runs only after a successful merge into temp-ci.
# GITHUB_TOKEN is injected automatically — no secret creation needed.
# The `packages: write` permission below is all that's required for GHCR access.
on:
  push:
    branches: [temp-ci]
  pull_request:
    branches: [temp-ci]

env:
  # Opt into Node.js 24 for all JavaScript actions (checkout, setup-python, etc.)
  # Node.js 20 is deprecated on GitHub runners as of June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  # Resolves to ghcr.io/<owner>/task-manager — lower-cased at use time
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/task-manager

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, fetch, ingest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          # Cache key covers both runtime and dev deps for this service
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: Install with dev extras
        working-directory: services/${{ matrix.service }}
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    # Only run on push events (i.e. a merge into temp-ci), not on PR events.
    # This means: tests gate the PR, build runs after the merge succeeds.
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, fetch, ingest]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          # --target prod selects the production multi-stage layer.
          # docker-compose.override.yml is never involved — we call Docker directly.
          target: prod
          push: true
          # Immutable SHA tag for GitOps pinning + floating `dev` tag for convenience
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
