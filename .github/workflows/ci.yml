name: CI

# Tests and security scans run on every PR targeting dev.
# Build (image push to GHCR), SBOM generation, and gitops update run only
# after a successful merge into dev.
# GITHUB_TOKEN is injected automatically — no secret creation needed.
# The `packages: write` permission below is all that's required for GHCR access.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

env:
  REGISTRY: ghcr.io
  # Resolves to ghcr.io/<owner>/task-manager — lower-cased at use time
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/task-manager

# ── Tests ────────────────────────────────────────────────────────────────────

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, fetch, ingest]

    steps:
      - name: Print GitHub context
        run: |
          echo "Event      : ${{ github.event_name }}"
          echo "Actor      : ${{ github.actor }}"
          echo "Repository : ${{ github.repository }}"
          echo "Ref        : ${{ github.ref }}"
          echo "SHA        : ${{ github.sha }}"
          echo "Source branch (head_ref, PRs only) : ${{ github.head_ref }}"
          echo "Target branch (base_ref, PRs only) : ${{ github.base_ref }}"

      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: Install with dev extras
        working-directory: services/${{ matrix.service }}
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest

# ── Security — SAST (Bandit) ─────────────────────────────────────────────────

  sast:
    name: SAST – ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, fetch, ingest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: Install with dev extras
        working-directory: services/${{ matrix.service }}
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Run Bandit
        # -ll  → report MEDIUM severity and above (skip LOW noise)
        # -q   → quiet: suppress file-level progress output
        working-directory: services/${{ matrix.service }}
        run: bandit -r src/ -ll -q

# ── Security — SCA (pip-audit) ───────────────────────────────────────────────

  sca:
    name: SCA – ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, fetch, ingest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: Install with dev extras
        working-directory: services/${{ matrix.service }}
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Run pip-audit
        working-directory: services/${{ matrix.service }}
        run: pip-audit

# ── Security — Dockerfile linting (Hadolint) ─────────────────────────────────

  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Lint services/api/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: services/api/Dockerfile
          config: ops/config/hadolint.yaml

      - name: Lint services/fetch/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: services/fetch/Dockerfile
          config: ops/config/hadolint.yaml

      - name: Lint services/ingest/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: services/ingest/Dockerfile
          config: ops/config/hadolint.yaml

# ── Security — Secret scanning (Gitleaks) ────────────────────────────────────

  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history lets Gitleaks scan every commit in the PR, not just
          # the tip — a secret committed and then "deleted" is still a leak.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Security — IaC / misconfiguration scanning (Trivy) ───────────────────────

  scan-configs:
    name: Scan IaC configs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy misconfiguration scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          # Scan Helm charts, docker-compose, and k8s manifests
          scan-ref: ops/
          exit-code: '1'
          severity: CRITICAL,HIGH
          # Suppress informational findings that are not actionable
          trivyignores: ops/config/.trivyignore

      - name: Run Trivy misconfiguration scan (docker-compose)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: docker-compose.yml
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: ops/config/.trivyignore

# ── Build ─────────────────────────────────────────────────────────────────────
# Runs only on push to dev (i.e. after a PR merges).
# Requires ALL security gates to pass before building and pushing images.

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, sast, sca, lint-dockerfiles, secrets-scan, scan-configs]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, fetch, ingest]

    steps:
      - name: Print GitHub context
        run: |
          echo "Event      : ${{ github.event_name }}"
          echo "Actor      : ${{ github.actor }}"
          echo "Repository : ${{ github.repository }}"
          echo "Ref        : ${{ github.ref }}"
          echo "SHA        : ${{ github.sha }}"
          echo "Image tags : ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}"
          echo "           : ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev"

      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Step 1: Build and load the image locally for scanning.
      # The layer cache is written to the GHA cache here and reused in Step 3,
      # so the push step is essentially free (no rebuild).
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v7
        with:
          context: services/${{ matrix.service }}
          target: prod
          load: true
          tags: scan/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 2: Scan the locally-loaded image.
      # --ignore-unfixed: skip CVEs with no available fix (can't action them).
      # exit-code 1: fail the job — and therefore block the push — if any
      # CRITICAL or HIGH fixed CVE is found.
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: scan/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          trivyignores: ops/config/.trivyignore

      # Step 3: Push to GHCR only if the scan passed.
      # Reuses the GHA layer cache from Step 1 — no full rebuild.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: services/${{ matrix.service }}
          target: prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 4: Generate SBOM for the pushed image and upload as a CI artifact.
      # Non-blocking: SBOM failure does not stop the deployment.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          artifact-name: sbom-${{ matrix.service }}-${{ github.sha }}.spdx
          output-file: /tmp/sbom-${{ matrix.service }}.spdx
        continue-on-error: true

# ── GitOps update ─────────────────────────────────────────────────────────────

  update-gitops:
    name: Update GitOps branch
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Print GitHub context
        run: |
          echo "Event      : ${{ github.event_name }}"
          echo "SHA        : ${{ github.sha }}"
          echo "Pinning gitops branch image tags to ${{ github.sha }}"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update gitops branch
        run: |
          SHA="${{ github.sha }}"

          cp -r ops/helm /tmp/helm-src

          if git ls-remote --exit-code origin gitops > /dev/null 2>&1; then
            git fetch origin gitops
            git checkout -b gitops origin/gitops
          else
            git checkout --orphan gitops
            git rm -rf . --quiet 2>/dev/null || true
          fi

          rm -rf ops/helm helm
          mkdir -p ops
          cp -r /tmp/helm-src ops/helm

          yq e ".images.api.tag = \"$SHA\""    -i ops/helm/task-manager/values.yaml
          yq e ".images.fetch.tag = \"$SHA\""  -i ops/helm/task-manager/values.yaml
          yq e ".images.ingest.tag = \"$SHA\"" -i ops/helm/task-manager/values.yaml

          git add -A
          git diff --cached --quiet && echo "No changes — gitops branch already up to date." && exit 0
          git commit -m "ci: pin images to ${SHA::7}"
          git push origin gitops
