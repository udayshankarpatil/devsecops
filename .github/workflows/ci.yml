name: CI

# Tests run on every PR targeting temp-argo.
# Build (image push to GHCR) runs only after a successful merge into temp-argo.
# GITHUB_TOKEN is injected automatically — no secret creation needed.
# The `packages: write` permission below is all that's required for GHCR access.
# TODO: revert temp-argo → dev once ArgoCD end-to-end test is complete.
on:
  push:
    branches: [temp-argo]
  pull_request:
    branches: [temp-argo]

env:
  REGISTRY: ghcr.io
  # Resolves to ghcr.io/<owner>/task-manager — lower-cased at use time
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/task-manager

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, fetch, ingest]

    steps:
      - name: Print GitHub context
        run: |
          echo "Event      : ${{ github.event_name }}"
          echo "Actor      : ${{ github.actor }}"
          echo "Repository : ${{ github.repository }}"
          echo "Ref        : ${{ github.ref }}"
          echo "SHA        : ${{ github.sha }}"
          echo "Source branch (head_ref, PRs only) : ${{ github.head_ref }}"
          echo "Target branch (base_ref, PRs only) : ${{ github.base_ref }}"

      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          # Cache key covers both runtime and dev deps for this service
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: Install with dev extras
        working-directory: services/${{ matrix.service }}
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    # Only run on push events (i.e. a merge into dev), not on PR events.
    # This means: tests gate the PR, build runs after the merge succeeds.
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, fetch, ingest]

    steps:
      - name: Print GitHub context
        run: |
          echo "Event      : ${{ github.event_name }}"
          echo "Actor      : ${{ github.actor }}"
          echo "Repository : ${{ github.repository }}"
          echo "Ref        : ${{ github.ref }}"
          echo "SHA        : ${{ github.sha }}"
          echo "Image tags : ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}"
          echo "           : ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev"

      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: services/${{ matrix.service }}
          # --target prod selects the production multi-stage layer.
          # docker-compose.override.yml is never involved — we call Docker directly.
          target: prod
          push: true
          # Immutable SHA tag for GitOps pinning + floating `dev` tag for convenience
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: Update GitOps branch
    runs-on: ubuntu-latest
    needs: build
    # Runs after a successful merge (same gate as build)
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Print GitHub context
        run: |
          echo "Event      : ${{ github.event_name }}"
          echo "SHA        : ${{ github.sha }}"
          echo "Pinning gitops branch image tags to ${{ github.sha }}"

      - uses: actions/checkout@v6
        with:
          # Fetch all branches so we can checkout/create the gitops branch
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update gitops branch
        run: |
          SHA="${{ github.sha }}"

          # Snapshot the helm directory from the current dev commit before
          # switching branches (git checkout overwrites the working tree).
          cp -r helm /tmp/helm-src

          # Switch to the gitops branch, creating it as an orphan on first run.
          if git ls-remote --exit-code origin gitops > /dev/null 2>&1; then
            git fetch origin gitops
            git checkout -b gitops origin/gitops
          else
            git checkout --orphan gitops
            git rm -rf . --quiet 2>/dev/null || true
          fi

          # Sync the full helm directory from dev (picks up any template changes).
          rm -rf helm
          cp -r /tmp/helm-src helm

          # Pin all three image tags to the merge SHA.
          yq e ".images.api.tag = \"$SHA\""    -i helm/task-manager/values.yaml
          yq e ".images.fetch.tag = \"$SHA\""  -i helm/task-manager/values.yaml
          yq e ".images.ingest.tag = \"$SHA\"" -i helm/task-manager/values.yaml

          git add helm/
          # Skip the commit if nothing changed (e.g. re-run of same SHA)
          git diff --cached --quiet && echo "No changes — gitops branch already up to date." && exit 0
          git commit -m "ci: pin images to ${SHA::7}"
          git push origin gitops
