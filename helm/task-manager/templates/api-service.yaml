apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "task-manager.labels" . | nindent 4 }}
spec:
  # NodePort so the api is reachable from the host via the Kind port mapping
  # defined in ansible/kind-config.yaml (hostPort 8080 → nodePort 30080).
  type: NodePort
  selector:
    app: api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      nodePort: {{ .Values.api.nodePort }}
