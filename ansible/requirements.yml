---
# Install with: ansible-galaxy collection install -r ansible/requirements.yml
collections:
  - name: kubernetes.core    # k8s module; helm tasks use the CLI directly (Helm 4 compat)
    version: ">=5.0.0"
  - name: community.docker   # docker_network_info, docker_container_info modules
    version: ">=3.0.0"
  - name: community.general  # general utilities
    version: ">=8.0.0"
